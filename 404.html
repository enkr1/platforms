<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — ENKR</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/favicon-peng.svg" type="image/svg+xml" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      display: grid;
      place-items: center;
      background: #0A1A2F;
      color: #F0F6FF;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
    }
    h1 {
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 700;
      line-height: 1;
      color: #E8A848;
      letter-spacing: -0.04em;
    }
    p {
      margin-top: 1rem;
      font-size: 1.125rem;
      color: #7A96B8;
    }
    a {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 1.75rem;
      border: 1px solid #E8A848;
      border-radius: 999px;
      color: #E8A848;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.2s ease, color 0.2s ease;
    }
    a:hover, a:focus-visible {
      background: #E8A848;
      color: #0A1A2F;
    }
  </style>
</head>
<body>
  <main>
    <h1>404</h1>
    <p>This page doesn't exist.</p>
    <a href="/">Back home</a>
  </main>
</body>
</html>
